# /usr/local/apache/conf/userdata/ssl/2/mail.netgate.net/oap-salearn.conf
# Proxy /salearn/* → http://127.0.0.1:8307/*
# After adding, run: /scripts/rebuildhttpdconf && systemctl reload httpd

<Location /salearn>
    ProxyPass        http://127.0.0.1:8307
    ProxyPassReverse http://127.0.0.1:8307
</Location>
